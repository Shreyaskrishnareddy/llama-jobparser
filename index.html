<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Parser — Groq + Llama 3.1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 0.5rem; color: #38bdf8; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
        .badge { display: inline-block; background: #1e3a5f; color: #38bdf8; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 4px; }

        /* Upload area */
        .upload-area {
            border: 2px dashed #334155; border-radius: 12px; padding: 3rem; text-align: center;
            cursor: pointer; transition: all 0.3s; background: #1e293b; margin-bottom: 1.5rem;
        }
        .upload-area:hover, .upload-area.drag-over { border-color: #38bdf8; background: #1e3a5f; }
        .upload-area h3 { margin-bottom: 0.5rem; color: #cbd5e1; }
        .upload-area p { color: #64748b; font-size: 0.85rem; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        input[type="file"] { display: none; }

        /* Text input */
        .text-toggle { text-align: center; margin-bottom: 1rem; }
        .text-toggle button {
            background: #334155; color: #cbd5e1; border: none; padding: 0.5rem 1rem;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem;
        }
        .text-toggle button:hover { background: #475569; }
        .text-input-area { display: none; margin-bottom: 1.5rem; }
        .text-input-area textarea {
            width: 100%; height: 200px; background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
            border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.85rem; resize: vertical;
        }
        .text-input-area button {
            margin-top: 0.5rem; background: #38bdf8; color: #0f172a; border: none;
            padding: 0.6rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600;
        }

        /* Status */
        .status { text-align: center; padding: 1rem; display: none; }
        .status.loading { display: block; color: #38bdf8; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #38bdf8; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results { display: none; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .result-header h2 { color: #38bdf8; font-size: 1.3rem; }
        .confidence-badge {
            padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
        }
        .conf-high { background: #166534; color: #4ade80; }
        .conf-medium { background: #854d0e; color: #facc15; }
        .conf-low { background: #991b1b; color: #fca5a5; }

        .meta-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .meta-item { background: #1e293b; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.8rem; }
        .meta-label { color: #64748b; }
        .meta-value { color: #e2e8f0; font-weight: 600; }

        /* Field cards */
        .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1rem; }
        .field-card {
            background: #1e293b; border-radius: 8px; padding: 1rem; border-left: 3px solid #334155;
        }
        .field-card.has-value { border-left-color: #38bdf8; }
        .field-card.null-field { opacity: 0.5; }
        .field-name { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
        .field-value { color: #e2e8f0; font-size: 0.9rem; word-break: break-word; }
        .field-value .null { color: #475569; font-style: italic; }
        .field-conf { float: right; font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; }

        /* Lists */
        .field-list { list-style: none; padding: 0; }
        .field-list li { padding: 0.3rem 0; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        .field-list li:last-child { border-bottom: none; }

        /* Skills */
        .skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .skill-tag { background: #334155; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        .skill-cat { color: #64748b; font-size: 0.65rem; }

        /* JSON view */
        .json-toggle { text-align: center; margin-top: 1.5rem; }
        .json-toggle button { background: #334155; color: #cbd5e1; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .json-view { display: none; margin-top: 1rem; background: #1e293b; border-radius: 8px; padding: 1rem; overflow-x: auto; }
        .json-view pre { color: #a5f3fc; font-size: 0.8rem; white-space: pre-wrap; }

        .copy-btn { background: #475569; color: #e2e8f0; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .copy-btn:hover { background: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JD Parser <span class="badge">Groq + Llama 3.1</span> <span class="badge">2-Pass</span></h1>
        <p class="subtitle">Upload a job description to extract structured data with confidence scoring</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">&#128196;</div>
            <h3>Drop JD file here or click to upload</h3>
            <p>PDF, DOCX, DOC, TXT — max 10MB</p>
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt,.html">
        </div>

        <div class="text-toggle">
            <button onclick="toggleTextInput()">Or paste JD text directly</button>
        </div>

        <div class="text-input-area" id="textArea">
            <textarea id="jdText" placeholder="Paste job description text here..."></textarea>
            <button onclick="parseText()">Parse JD Text</button>
        </div>

        <div class="status" id="status">
            <span class="spinner"></span>
            <span id="statusText">Parsing job description (2-pass)...</span>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const results = document.getElementById('results');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            if (e.dataTransfer.files.length) parseFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) parseFile(fileInput.files[0]); });

        function toggleTextInput() {
            const ta = document.getElementById('textArea');
            ta.style.display = ta.style.display === 'none' ? 'block' : 'block';
            if (ta.style.display === 'block') document.getElementById('jdText').focus();
        }

        async function parseFile(file) {
            showLoading(`Parsing "${file.name}" (2-pass for accuracy)...`);
            const form = new FormData();
            form.append('file', file);
            try {
                const resp = await fetch('/parse', { method: 'POST', body: form });
                const data = await resp.json();
                if (data.error) { showError(data.error); return; }
                renderResult(data.result || data);
            } catch (e) { showError(e.message); }
        }

        async function parseText() {
            const text = document.getElementById('jdText').value.trim();
            if (!text) return;
            showLoading('Parsing JD text (2-pass for accuracy)...');
            try {
                const resp = await fetch('/parse/text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await resp.json();
                if (data.error) { showError(data.error); return; }
                renderResult(data.result || data);
            } catch (e) { showError(e.message); }
        }

        function showLoading(msg) {
            status.className = 'status loading';
            statusText.textContent = msg;
            results.style.display = 'none';
        }
        function showError(msg) {
            status.className = 'status';
            status.style.display = 'block';
            status.innerHTML = `<span style="color:#f87171">Error: ${msg}</span>`;
        }

        function renderResult(data) {
            status.style.display = 'none';
            results.style.display = 'block';

            const gc = data.global_confidence || 0;
            const confClass = gc >= 0.9 ? 'conf-high' : gc >= 0.75 ? 'conf-medium' : 'conf-low';
            const meta = data._metadata || {};
            const fields = data.fields || {};

            let html = `
                <div class="result-header">
                    <h2>${getFieldText(fields.title) || 'Job Description'}</h2>
                    <span class="confidence-badge ${confClass}">${(gc * 100).toFixed(1)}% confidence</span>
                </div>
                <div class="meta-bar">
                    <div class="meta-item"><span class="meta-label">Model: </span><span class="meta-value">${meta.model || 'N/A'}</span></div>
                    <div class="meta-item"><span class="meta-label">Time: </span><span class="meta-value">${meta.processing_time_ms || 0}ms</span></div>
                    <div class="meta-item"><span class="meta-label">Tokens: </span><span class="meta-value">${meta.total_tokens || 0}</span></div>
                    <div class="meta-item"><span class="meta-label">Passes: </span><span class="meta-value">${meta.passes || 1}</span></div>
                    <div class="meta-item"><span class="meta-label">Language: </span><span class="meta-value">${data.detected_language || 'en'}</span></div>
                </div>
                <div class="field-grid">
            `;

            const fieldOrder = [
                'title', 'company', 'location', 'employment_type', 'work_mode',
                'salary', 'experience_years', 'job_summary', 'responsibilities',
                'requirements', 'skills', 'education', 'certifications', 'benefits',
                'job_domain', 'reporting_to', 'team_size', 'travel_requirement',
                'job_posted_date', 'job_expiry_date', 'application_link',
                'company_website', 'industry', 'company_size', 'company_overview',
                'preferred_experience', 'preferred_technologies',
                'work_authorization', 'job_id', 'equal_opportunity_statement'
            ];

            for (const fname of fieldOrder) {
                const field = fields[fname];
                html += renderField(fname, field);
            }

            html += '</div>';

            // JSON toggle
            html += `
                <div class="json-toggle">
                    <button onclick="toggleJson()">View Raw JSON</button>
                    <button class="copy-btn" onclick="copyJson()">Copy JSON</button>
                </div>
                <div class="json-view" id="jsonView">
                    <pre id="jsonPre">${escHtml(JSON.stringify(data, null, 2))}</pre>
                </div>
            `;

            results.innerHTML = html;
        }

        function getFieldText(field) {
            if (!field || !field.value) return null;
            if (typeof field.value === 'string') return field.value;
            if (field.value.text) return field.value.text;
            if (field.value.formatted_address) return field.value.formatted_address;
            return JSON.stringify(field.value);
        }

        function renderField(name, field) {
            const isNull = !field || field.value === null || field.value === undefined;
            const cls = isNull ? 'field-card null-field' : 'field-card has-value';
            const label = name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

            let confBadge = '';
            if (field && field.confidence !== undefined) {
                const c = field.confidence;
                const cc = c >= 0.9 ? 'conf-high' : c >= 0.75 ? 'conf-medium' : 'conf-low';
                confBadge = `<span class="field-conf ${cc}">${(c * 100).toFixed(0)}%</span>`;
            }

            let valueHtml = '<span class="null">null</span>';
            if (!isNull) {
                valueHtml = renderValue(name, field.value);
            }

            return `<div class="${cls}"><div class="field-name">${label} ${confBadge}</div><div class="field-value">${valueHtml}</div></div>`;
        }

        function renderValue(name, value) {
            if (value === null || value === undefined) return '<span class="null">null</span>';

            // Arrays
            if (Array.isArray(value)) {
                if (value.length === 0) return '<span class="null">[]</span>';
                // Skills array
                if (name === 'skills' && value[0] && value[0].name) {
                    return '<div class="skill-tags">' + value.map(s =>
                        `<span class="skill-tag">${escHtml(s.name)} <span class="skill-cat">${s.category || ''}</span></span>`
                    ).join('') + '</div>';
                }
                // String arrays
                return '<ul class="field-list">' + value.map(v =>
                    `<li>${escHtml(typeof v === 'string' ? v : JSON.stringify(v))}</li>`
                ).join('') + '</ul>';
            }

            // Objects
            if (typeof value === 'object') {
                if (name === 'title') return `<strong>${escHtml(value.text || '')}</strong>${value.seniority_level ? ' (' + escHtml(value.seniority_level) + ')' : ''}${value.domain ? ' — ' + escHtml(value.domain) : ''}`;
                if (name === 'location') return escHtml(value.formatted_address || '') + (value.remote ? ` (${value.remote})` : '');
                if (name === 'salary') {
                    const fmt = v => typeof v === 'number' ? v.toLocaleString() : v;
                    return `${value.currency || ''} ${fmt(value.min)}–${fmt(value.max)} / ${value.period || 'year'}`;
                }
                if (name === 'experience_years') return `${value.min_years}–${value.max_years} years (${value.requirement_type || 'required'})`;
                if (name === 'education') return `${value.level || ''} in ${value.field || ''}`;
                return escHtml(JSON.stringify(value));
            }

            return escHtml(String(value));
        }

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function toggleJson() {
            const jv = document.getElementById('jsonView');
            jv.style.display = jv.style.display === 'none' ? 'block' : 'none';
        }

        function copyJson() {
            const pre = document.getElementById('jsonPre');
            navigator.clipboard.writeText(pre.textContent).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy JSON', 2000);
            });
        }
    </script>
</body>
</html>
